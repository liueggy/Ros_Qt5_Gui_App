name: Windows:RosBridge

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths-ignore:
      - '**/*.md'
      - 'doc/**'
      - 'docs/**'
      - 'screenshots/**'
  workflow_dispatch:

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
  SCCACHE_GHA_ENABLED: "true"
  CMAKE_GENERATOR: Ninja
  CMAKE_C_COMPILER_LAUNCHER: sccache
  CMAKE_CXX_COMPILER_LAUNCHER: sccache

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Setup vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with:
          committish: '2024.12.16'
          cache: true

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-installed-${{ runner.os }}-x64-windows-vcpkg2024.12.16-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-x64-windows-vcpkg2024.12.16-
            vcpkg-installed-${{ runner.os }}-x64-windows-

      - name: Build via project script
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        run: |
          if "${{ steps.vcpkg-cache.outputs.cache-hit }}"=="true" (
            build.bat ci
          ) else (
            build.bat
          )

      - name: Show sccache statistics
        shell: pwsh
        run: |
          sccache --show-stats

      - name: Test
        run: |
          ctest --test-dir build -C Release --output-on-failure

      - name: Package
        run: |
          cd build\install\bin
          powershell Compress-Archive -Path * -DestinationPath ros_qt5_gui_app_windows_x64.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros_qt5_gui_app_windows_x64
          path: build/install/bin/ros_qt5_gui_app_windows_x64.zip

      - name: Publish latest Windows package to Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: qt-windows-latest
          RELEASE_TITLE: Ros Qt5 GUI App Windows x64 Latest
          PACKAGE_PATH: build/install/bin/ros_qt5_gui_app_windows_x64.zip
        run: |
          $ErrorActionPreference = 'Stop'
          $repo = $env:GITHUB_REPOSITORY
          $tag = $env:RELEASE_TAG
          $title = $env:RELEASE_TITLE
          $package = $env:PACKAGE_PATH
          $commit = $env:GITHUB_SHA
          $shortCommit = $commit.Substring(0, 7)
          $runUrl = "https://github.com/$repo/actions/runs/$env:GITHUB_RUN_ID"
          $body = @"
          自动更新的 Windows x64 最新构建包。

          - 分支：$env:GITHUB_REF_NAME
          - Commit：$shortCommit
          - 构建编号：$env:GITHUB_RUN_NUMBER
          - 构建时间：$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss K')
          - Actions：$runUrl

          下载下面的 `ros_qt5_gui_app_windows_x64.zip` 即可。
          "@

          git tag -f $tag $commit
          git push origin "refs/tags/$tag" --force

          if (gh release view $tag --repo $repo *> $null) {
            gh release edit $tag --repo $repo --title $title --notes $body --latest
          } else {
            gh release create $tag --repo $repo --title $title --notes $body --latest
          }

          $assets = gh release view $tag --repo $repo --json assets --jq '.assets[].name'
          foreach ($asset in $assets) {
            if ($asset) {
              gh release delete-asset $tag $asset --repo $repo --yes
            }
          }

          gh release upload $tag $package --repo $repo --clobber
